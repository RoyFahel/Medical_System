<div class="auth-card card">
  <h2>Register</h2>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label>Full name</label>
      <input formControlName="full_name" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" formControlName="password" />
    </div>

    <p class="small">New accounts are created as patient accounts. Admin accounts are created from the backend/database.</p>

    <div class="error" *ngIf="error">{{ error }}</div>
    <button class="btn btn-primary" [disabled]="form.invalid">Create patient account</button>
  </form>
  <p class="small" style="margin-top: 1rem;">Already registered? <a routerLink="/login">Login</a></p>
</div>
