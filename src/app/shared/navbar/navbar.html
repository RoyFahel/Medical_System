<nav>
    <div class="inner">
      <a class="brand" routerLink="/">Medical System</a>
      <div class="links">
        <a *ngIf="auth.isAdmin()" routerLink="/users">Users</a>
        <a routerLink="/doctors" routerLinkActive="active">Doctors</a>
        <a routerLink="/diseases" routerLinkActive="active">Diseases</a>
        <a *ngIf="auth.isLoggedIn()" routerLink="/appointments" routerLinkActive="active">Appointments</a>
        <a *ngIf="!auth.isLoggedIn()" routerLink="/login" routerLinkActive="active">Login</a>
        <a *ngIf="!auth.isLoggedIn()" routerLink="/register" routerLinkActive="active">Register</a>
        <span *ngIf="auth.isLoggedIn()">{{ welcome() }}</span>
        <button *ngIf="auth.isLoggedIn()" class="btn btn-secondary" (click)="logout()">Logout</button>
      </div>
    </div>
  </nav>
