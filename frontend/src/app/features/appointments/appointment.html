
<section class="container">
    <div class="page-title">
      <h2>Appointments</h2>
      <a class="btn btn-primary" routerLink="/appointments/new">Create appointment</a>
    </div>

    <div class="card toolbar">
      <select [(ngModel)]="statusFilter">
        <option value="">All statuses</option>
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="cancelled">Cancelled</option>
        <option value="completed">Completed</option>
      </select>
      <button class="btn btn-secondary" (click)="load()">Apply</button>
    </div>

    <div class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Doctor</th>
            <th *ngIf="auth.isAdmin()">Patient</th>
            <th>Status</th>
            <th>Notes</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let appointment of appointments">
            <td>{{ appointment.appointment_date }}</td>
            <td>{{ getDoctorName(appointment) }}</td>
            <td *ngIf="auth.isAdmin()">{{ appointment.patient_details?.full_name || '—' }}</td>
            <td><span class="badge" [ngClass]="appointment.status">{{ appointment.status }}</span></td>
            <td>{{ appointment.notes || '—' }}</td>
            <td>
              <div class="actions">
                <select *ngIf="auth.isAdmin()" [(ngModel)]="appointment.status" (change)="saveStatus(appointment)">
                  <option value="pending">Pending</option>
                  <option value="confirmed">Confirmed</option>
                  <option value="cancelled">Cancelled</option>
                  <option value="completed">Completed</option>
                </select>
                <button class="btn btn-danger" (click)="remove(appointment.id)">Delete</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
