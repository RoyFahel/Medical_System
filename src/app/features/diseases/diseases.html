<section class="container">
  <div class="page-title">
    <h2>Diseases</h2>
    <a *ngIf="auth.isAdmin()" class="btn btn-primary" routerLink="/diseases/new">
      Add disease
    </a>
  </div>

  <div class="card toolbar">
    <input [(ngModel)]="search" placeholder="Search by disease name" />

    <select [(ngModel)]="ordering">
      <option value="name">Name A-Z</option>
      <option value="-name">Name Z-A</option>
      <option value="created_at">Created date</option>
    </select>

    <button class="btn btn-secondary" (click)="load()">Apply</button>
  </div>

  <div class="error" *ngIf="error">{{ error }}</div>

  <div class="grid grid-3 disease-grid">
    <div class="card disease-card" *ngFor="let disease of diseases">
      <div class="disease-image-wrap" *ngIf="disease.image_url">
        <img
          class="disease-image"
          [src]="disease.image_url"
          [alt]="disease.name"
        />
      </div>

      <h3 class="disease-title">{{ disease.name }}</h3>

      <p class="disease-description">
        {{ disease.description || 'No description added.' }}
      </p>

      <div class="disease-section">
        <strong>Symptoms</strong>
        <p>{{ disease.symptoms || 'No symptoms added.' }}</p>
      </div>

      <div class="disease-section">
        <strong>Prevention</strong>
        <p>{{ disease.prevention || 'No prevention added.' }}</p>
      </div>

      <div class="actions">
        <a
          *ngIf="auth.isAdmin()"
          class="btn btn-secondary"
          [routerLink]="['/diseases', getKey(disease), 'edit']"
        >
          Edit
        </a>

        <button
          *ngIf="auth.isAdmin()"
          type="button"
          class="btn btn-danger"
          (click)="remove(getKey(disease))"
        >
          Delete
        </button>
      </div>
    </div>
  </div>
</section>
