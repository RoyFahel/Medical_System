
<div class="auth-card card">
    <h2>Login</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" />
        <div class="error" *ngIf="form.controls.email.invalid && form.controls.email.touched">Valid email required.</div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" />
        <div class="error" *ngIf="form.controls.password.invalid && form.controls.password.touched">Password required.</div>
      </div>
      <div class="error" *ngIf="error">{{ error }}</div>
      <button class="btn btn-primary" [disabled]="form.invalid">Login</button>
    </form>
    <p class="small" style="margin-top: 1rem;">No account? <a routerLink="/register">Register</a></p>
  </div>
