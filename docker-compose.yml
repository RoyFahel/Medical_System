services:
  mongodb:
    image: mongo
    ports:
     - 27017:27017
    environment:
     - MONGO_INITDB_ROOT_USERNAME=admin
     - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
     - mongo-data:/data/db
  mongo-express:
    image: mongo-express
    restart: always
    ports:
     - 8080:8081
    environment:
     - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
     - ME_CONFIG_MONGODB_ADMINPASSWORD=password
     - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
     - "mongodb"
  backend:
    image: medicale-backend:latest
    container_name: medicale-backend
    ports:
      - 8000:8000
    depends_on:
      - "mongodb"
  frontend:
    image: medicale-frontend:latest
    container_name: medicale-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo-data: