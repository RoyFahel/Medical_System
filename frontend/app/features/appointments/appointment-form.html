
<section class="container">
    <div class="page-title"><h2>Create appointment</h2></div>
    <div class="card">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-group">
          <label>Doctor</label>
          <select formControlName="doctor" required>
            <option value="">Select a doctor</option>
            <option *ngFor="let doctor of doctors" [value]="doctor.email">{{ doctor.full_name }} — {{ doctor.specialty }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Appointment date</label>
          <input type="date" formControlName="appointment_date" required />
        </div>
        <div class="form-group">
          <label>Appointment time</label>
          <input type="time" formControlName="appointment_time" required />
        </div>
        <div class="form-group">
          <label>Reason</label>
          <textarea formControlName="notes" placeholder="Describe symptoms or reason for visit"></textarea>
        </div>
        <div class="error" *ngIf="error">{{ error }}</div>
        <div class="actions"><button class="btn btn-primary" [disabled]="form.invalid">Create</button><button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button></div>
      </form>
    </div>
  </section>
